<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="weather_container">
            <div class="temp">
                <p>25°C</p>
            </div>
            <div class="location_time">
                <p>Lucknow</p>
                <span > 10:30 PM - 01/01/2026 </span>
            </div>
           
            <div class="condition">
                <img src="weather.jpg" alt="Weather image">
                <p>mist </p>
            </div>
        </div>
         
    </div>

    <form>
        <input type="text" placeholder="Enter Location " class="search_area ">
        <button class="btn" value="submit">Search </button>
    </form>

    <script src="script.js"></script>
</body>

</html>
